DATASET:
  NAME: 'Laboratory'
  DATA_PATH: 'dataset/Development/lowlight_development/development/Laboratory'
  BACKGROUND_COLOR: 255.0
  AUXILIARY_DIR: 'auxiliaries'

SEED: 3407

MODEL:
  NAME: 'Simple3DGS'
  NUM_INIT_POINTS: 100000
  INIT_MODE: 'hybrid_anchor'
  INIT_ANCHOR_RATIO: 0.10
  INIT_ANCHOR_MAX_DEPTH_GRAD: 0.08
  INIT_ANCHOR_BRIGHTNESS_QUANTILE: 0.7
  INIT_DEPTH_DIR: 'auxiliaries/depth'
  INIT_DEPTH_NORMALIZATION: 'per_frame_robust'
  INIT_DEPTH_NORM_LOW_Q: 1.0
  INIT_DEPTH_NORM_HIGH_Q: 99.0
  INIT_VOXEL_DOWNSAMPLE: true
  INIT_VOXEL_SIZE: 0.03
  INIT_BACKPROJECT_NEAR: 0.2
  INIT_BACKPROJECT_FAR: 6.0
  INIT_BACKPROJECT_SAMPLE_STRIDE: 4
  INIT_BACKPROJECT_MIN_VALID_POINTS: 100000
  INIT_BACKPROJECT_DEPTH_EPS: 1.0e-3
  INIT_BACKPROJECT_DEPTH_INVERT: false
  SH_DEGREE: 3
  SCENE_SCALE: 2.0
  TRAIN_TOTAL_STEP: 5000
  VAL_INTERVAL_STEP: 1000
  LOG_INTERVAL_STEP: 100
  SH_UPGRADE_INTERVAL: 1000
  CHECKPOINT_STEPS: [2000, 3000, 5000]
  LR_MEANS: 8.0e-5
  LR_MEANS_FINAL: 8.0e-7
  LR_QUATS: 5.0e-4
  LR_SCALES: 2.5e-3
  LR_OPACITIES: 2.5e-2
  LR_SH0: 2.5e-3
  LR_SHN: 1.25e-4
  WARMSTART_CHECKPOINT: 'outputs/stage4_tuned_colmap/Laboratory/step_15000/step_15000.pt'
  DENSIFY_START_STEP: 6000
  DENSIFY_STOP_STEP: 6000
  DENSIFY_INTERVAL: 200
  DENSIFY_GRAD_THRESH: 0.0002
  OPACITY_RESET_INTERVAL: 3000
  LAMBDA_SSIM: 0.2

AUGMENTATION:
  ENABLED: true
  MODE: 'hybrid'
  GAMMA_RANGE: [0.45, 0.65]
  EVAL_GAMMA: 0.55
  TARGET_MEAN: 0.38
  TARGET_MEAN_JITTER: 0.10
  MIN_SCALE: 1.0
  MAX_SCALE: 3.0

LOSS:
  LAMBDA_SSIM: 0.2
  LAMBDA_LOW_LIGHT: 0.0
  LAMBDA_EXPOSURE: 0.05

PRIORS:
  DEPTH:
    ENABLED: true
    WEIGHT: 0.01
    GLOBAL_WEIGHT: 1.0
    LOCAL_WEIGHT: 1.0
    BOX_SIZE: 128
    SAMPLE_RATIO: 0.5
    START_STEP: 0
  STRUCTURE:
    ENABLED: true
    WEIGHT: 0.01
    START_STEP: 0
    INVARIANT: 'W'
    KERNEL_SIZE: 3
    SCALE: 0.8
  MULTIVIEW:
    ENABLED: false
    WEIGHT: 0.02
    START_STEP: 0
    SAMPLE_STRIDE: 4
    MIN_ALPHA: 0.2
    RELATIVE_DEPTH_THRESH: 0.05
    ABSOLUTE_DEPTH_THRESH: 0.02
    EPS: 1.0e-4
  SPARSE:
    ENABLED: true
    WEIGHT: 0.002
    START_STEP: 0
    SAMPLE_POINTS: 1024
    MIN_OPACITY: 0.2
    DISTANCE_CLAMP: 0.05
    COLMAP_DIR: 'auxiliaries/colmap_sparse'

EXPERIMENT:
  STAGE: 'stage5b_ft'

